post-checkout:
  commands:
    # Bootstrap a freshly created worktree. git fires post-checkout on
    # `git worktree add` (and on every branch checkout). A new worktree has no
    # node_modules of its own — worktrees don't share them — so we detect that
    # exact state and run `npm install`. Ordinary branch switches keep their
    # node_modules and are skipped, so this never slows down day-to-day work.
    # Runs synchronously, so the worktree is ready when the command returns.
    # This makes the repo self-bootstrapping and removes the need for an
    # external (e.g. Orca) setup trigger. Skip with LEFTHOOK=0. See spec 0025.
    bootstrap-deps:
      run: |
        if [ -d node_modules ]; then exit 0; fi
        printf '\n[lefthook] Fresh worktree (no node_modules) — running npm install...\n'
        npm install

pre-commit:
  commands:
    # Block high-signal secrets in staged content. Defense-in-depth, not a
    # security boundary; bypass a confirmed false positive with --no-verify.
    # Pure node, no dependency. See spec 0028 and docs/16.
    secret-scan:
      run: node scripts/secret-scan.mjs
    # Reject a staged .claude/settings.json that fails to parse or grants an
    # arbitrary-execution wildcard (e.g. Bash(node *)). See ADR 0007 / spec 0028.
    settings-guard:
      run: node scripts/settings-guard.mjs
    typecheck:
      run: npm run type-check
    lint:
      run: npm run lint
    test:
      run: npm run test

pre-push:
  commands:
    # The repo merges PRs via rebase, so every commit on a feature branch
    # lands on main as a permanent commit. Block pushes that contain
    # autosquash markers (fixup!/squash!/amend!) or WIP/tmp/temp subjects —
    # they should be consolidated via `git rebase --autosquash main` before
    # merge. Bypass with `git push --no-verify` for legitimate WIP shares.
    fixup-guard:
      run: |
        base=$(git merge-base HEAD origin/main 2>/dev/null) || base=""
        if [ -z "$base" ]; then exit 0; fi
        sloppy=$(git log --format='%h %s' "$base..HEAD" 2>/dev/null | grep -Ei '^[a-f0-9]+ (fixup!|squash!|amend!|(wip|tmp|temp)([: !]|$))' || true)
        if [ -n "$sloppy" ]; then
          printf '\nRefusing to push: unflushed fixup/wip commits detected:\n%s\n\nConsolidate before pushing for merge:\n  git rebase --autosquash main      # folds fixup!/squash! into their targets\n  git rebase -i main                # manual squash/reword\n  git commit --amend                # for the most recent commit only\n\nThen push with --force-with-lease. To bypass (e.g. sharing a WIP branch),\nuse: git push --no-verify\n\n' "$sloppy" >&2
          exit 1
        fi
