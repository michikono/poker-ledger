name: Deploy Firestore Config

on:
  push:
    branches: [main]
    paths:
      - firestore.rules
      - firestore.indexes.json
      - scripts/deploy-firestore-config.mjs
      - .github/workflows/deploy-firestore.yml

permissions:
  id-token: write
  contents: read

concurrency: deploy-firestore

jobs:
  deploy:
    name: Deploy Firestore
    runs-on: ubuntu-latest
    # Keep the environment so the OIDC subject (and thus the WIF trust) is
    # unchanged. To make this a single flow with no approval prompt, remove the
    # "Required reviewers" rule on the firestore-production environment in repo
    # Settings — that does not affect auth.
    environment: firestore-production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/1030556024864/locations/global/workloadIdentityPools/github/providers/poker-ledger
          service_account: firestore-deployer@poker-ledger-8d3bc.iam.gserviceaccount.com
          token_format: access_token
      # firebase-tools cannot authenticate from a keyless WIF credentials file, so
      # deploy rules + indexes directly via the Firebase REST APIs using the
      # short-lived access token the auth step mints. See spec 0044.
      - run: node scripts/deploy-firestore-config.mjs
        env:
          FIREBASE_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
          FIREBASE_PROJECT_ID: poker-ledger-8d3bc
